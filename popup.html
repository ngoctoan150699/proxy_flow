<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ProxyFlow giúp chọn, lọc và cập nhật proxy công khai từ monosans/proxy-list trong Chrome.">
    <title>ProxyFlow - Smart Proxy Picker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"><span>PF</span></div>
          <div>
            <h1 id="app-title">ProxyFlow</h1>
            <p id="statusText" class="status-text">Đang tải...</p>
          </div>
        </div>
        <div class="top-actions">
          <label for="languageSelect" class="visually-hidden">Language</label>
          <select id="languageSelect" class="language-select" aria-label="Language">
            <option value="vi">VI</option>
            <option value="en">EN</option>
            <option value="zh">中文</option>
            <option value="ru">RU</option>
            <option value="es">ES</option>
            <option value="fr">FR</option>
            <option value="ja">日本</option>
          </select>
          <div id="statusOrb" class="status-orb" title="Trạng thái proxy"></div>
        </div>
      </header>

      <section class="connection-card" aria-labelledby="selected-title">
        <div class="connection-meta">
          <p id="selected-title" class="section-label" data-i18n="currentConnection">Kết nối hiện tại</p>
          <div id="selectedProxy" class="selected-proxy">Chưa chọn proxy</div>
        </div>
        <button id="directBtn" class="btn btn-ghost" type="button" data-i18n="turnOff">Tắt Proxy</button>
      </section>

      <section class="control-card" aria-label="Điều khiển proxy">
        <div class="field-row">
          <div class="field-group">
            <label for="countryFilter" data-i18n="country">Quốc gia</label>
            <select id="countryFilter">
              <option value="all">Tất cả quốc gia</option>
            </select>
          </div>
          <div class="field-group compact">
            <label for="protocolFilter" data-i18n="protocol">Giao thức</label>
            <select id="protocolFilter">
              <option value="all">Tất cả giao thức</option>
            </select>
          </div>
        </div>

        <button id="randomCountryBtn" class="btn btn-random" type="button">
          <span>🎲</span>
          <strong data-i18n="randomTitle">Random theo quốc gia</strong>
        </button>

        <div class="mini-actions">
          <button id="checkIpBtn" class="btn btn-mini btn-glow" type="button" data-i18n="checkIp">Check IP</button>
          <button id="refreshBtn" class="btn btn-mini btn-primary" type="button" data-i18n="refresh">Cập nhật</button>
        </div>
      </section>

      <section class="search-card" aria-label="Tìm kiếm proxy">
        <label for="searchInput" class="visually-hidden" data-i18n="quickSearch">Tìm nhanh</label>
        <input id="searchInput" type="search" placeholder="Mỹ, USA, Nhật, Đức, host, ASN...">
      </section>

      <section class="stats-strip" aria-label="Thống kê proxy">
        <article><strong id="totalCount">0</strong><span data-i18n="totalProxy">Tổng proxy</span></article>
        <article><strong id="countryCount">0</strong><span data-i18n="countries">Quốc gia</span></article>
        <article><strong id="fastCount">0</strong><span data-i18n="fastProxy">Proxy nhanh</span></article>
      </section>

      <nav class="tabs" aria-label="Chế độ xem proxy">
        <button id="allTabBtn" class="tab-btn active" type="button" data-view="all" data-i18n="all">Tất cả</button>
        <button id="favoritesTabBtn" class="tab-btn" type="button" data-view="favorites">★ Yêu thích</button>
      </nav>

      <section class="list-header" aria-label="Thông tin danh sách">
        <span id="resultCount">0 proxy</span>
        <span id="updatedAt">Offline data</span>
      </section>

      <section id="proxyList" class="proxy-list" aria-label="Danh sách proxy"></section>
    </main>

    <script src="proxy-data.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
